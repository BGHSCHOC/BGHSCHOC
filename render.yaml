services:
  - type: web
    name: choc-meeting-signin
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: choc-meeting-signin
          property: port
    autoDeploy: true
    branch: main